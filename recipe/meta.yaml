{% set name = "behave" %}
{% set version = "1.3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 2b8f4b64ed2ea756a5a2a73e23defc1c4631e9e724c499e46661778453ebaf51

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - behave = behave.__main__:main
  skip: true  # [py<27]

requirements:
  host:
    - python
    - setuptools
    # which will be released with 1.2.7
    - pip
    - wheel
  run:
    - python
    - parse >=1.18.0
    - parse_type >=0.6.0
    - six >=1.15.0
    - cucumber-tag-expressions >=4.1.0
    - cucumber-expressions >=17.1.0  # [py>=38]
    - enum34  # [py<34]
    - contextlib2  # [py<35]
    - pathlib  # [py<34]
    - pathlib2 >=2.3.6  # [py<36]
    - scandir >=1.10.0  # [py<35]
    - traceback2  # [py<30]
    - win_unicode_console  # [py<=39]
    - colorama >=0.3.7
    - tomli >=1.1.0  # [py>=30 and py<311]
    - toml >=0.10.2  # [py<30]

test:
  imports:
    - behave
    - behave.compat
    - behave.formatter
    - behave.reporter
  requires:
    - pip
  commands:
    - behave --help
    - pip check

about:
  home: https://github.com/behave/behave
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: behave is behaviour-driven development, Python style
  description: |
    Behavior-driven development (or BDD) is an agile software development
    technique that encourages collaboration between developers, QA and
    non-technical or business participants in a software project.

    behave uses tests written in a natural language style, backed up by Python
    code.
  doc_url: https://behave.readthedocs.io
  dev_url: https://github.com/behave/behave

extra:
  recipe-maintainers:
    - stuertz
